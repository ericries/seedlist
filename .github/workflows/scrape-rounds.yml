name: Scrape Funding Rounds

on:
  schedule:
    - cron: '23 */6 * * *'  # Every 6 hours at :23
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Scrape funding rounds
        run: python3 scripts/scrape_rounds.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending-rounds.yaml
          if git diff --cached --quiet; then
            echo "No new rounds found"
          else
            git commit -m "Scrape: $(date +%Y-%m-%d) funding round candidates [automated]"
            git push
          fi
