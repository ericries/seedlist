# Sector Taxonomy for Seedlist
#
# Maps specific sector_focus tags (used in profile frontmatter) to parent
# categories (used in browse page filtering). A tag can map to multiple parents.
#
# Format:
#   parent-category:
#     label: "Display Name"
#     tags:
#       - specific-tag-1
#       - specific-tag-2
#
# Tags not listed here pass through unmapped (shown under "Other" in filters).
# Agents should prefer specific tags from this file over generic ones.

